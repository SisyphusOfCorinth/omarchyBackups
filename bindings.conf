# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu

unbind = SUPER SHIFT, O,

# Custom Misc. binds:

bindd = CTRL SUPER SHIFT, T, Toggle touchpad, exec, touchpad-toggle
bindmd = SUPER SHIFT, mouse:272, Resize window, resizewindow
bindd = SUPER, Q, Close active window, killactive,
# bindr = SUPER, SUPER_L, exec, pkill walker || walker -p "Start..."
bindd = SUPER SHIFT, O, Brave, exec, brave

# Custom tiling binds:
#
# Swap full screen behavior
#
# Unbind first

unbind = SUPER, F,
unbind = SUPER ALT, F,

bindd = SUPER ALT, F, Force full screen, fullscreen, 0
bindd = SUPER, F, Full width, fullscreen, 1

# Custom workspace binds:
#
# These add numpad functionality to workspace management. They do not overwrite the defaults but add to them (hopefully)

# Switch workspaces

bind = SUPER, code:87, workspace, 1
bind = SUPER, code:88, workspace, 2
bind = SUPER, code:89, workspace, 3
bind = SUPER, code:83, workspace, 4
bind = SUPER, code:84, workspace, 5
bind = SUPER, code:85, workspace, 6
bind = SUPER, code:79, workspace, 7
bind = SUPER, code:80, workspace, 8
bind = SUPER, code:81, workspace, 9
bind = SUPER, 0, workspace, 10

# Move to workspace with focused container with ALT + SHIFT + [0-9]
bind = CTRL SUPER, code:87, movetoworkspace, 1
bind = CTRL SUPER, code:88, movetoworkspace, 2
bind = CTRL SUPER, code:89, movetoworkspace, 3
bind = CTRL SUPER, code:83, movetoworkspace, 4
bind = CTRL SUPER, code:84, movetoworkspace, 5
bind = CTRL SUPER, code:85, movetoworkspace, 6
bind = CTRL SUPER, code:79, movetoworkspace, 7
bind = CTRL SUPER, code:80, movetoworkspace, 8
bind = CTRL SUPER, code:81, movetoworkspace, 9
bind = CTRL SUPER, 0, movetoworkspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER ALT, code:87, movetoworkspacesilent, 1
bind = SUPER ALT, code:88, movetoworkspacesilent, 2
bind = SUPER ALT, code:89, movetoworkspacesilent, 3
bind = SUPER ALT, code:83, movetoworkspacesilent, 4
bind = SUPER ALT, code:84, movetoworkspacesilent, 5
bind = SUPER ALT, code:85, movetoworkspacesilent, 6
bind = SUPER ALT, code:79, movetoworkspacesilent, 7
bind = SUPER ALT, code:80, movetoworkspacesilent, 8
bind = SUPER ALT, code:81, movetoworkspacesilent, 9
bind = SUPER ALT, 0, movetoworkspacesilent, 10

# Move Windows with shift + arrow keys
# 
# Have to unbind omarchy values first:
unbind = SUPER SHIFT, LEFT,
unbind = SUPER SHIFT, RIGHT,
unbind = SUPER SHIFT, UP,
unbind = SUPER SHIFT, DOWN,

# New values:

bind = SUPER SHIFT,up, movewindow, u
bind = SUPER SHIFT,down, movewindow, d
bind = SUPER SHIFT,left, movewindow, l
bind = SUPER SHIFT,right, movewindow, r

# Workgroups

bindd = SUPER CTRL ALT, code:87, Switch to group window 1, changegroupactive, 1
bindd = SUPER CTRL ALT, code:88, Switch to group window 2, changegroupactive, 2
bindd = SUPER CTRL ALT, code:89, Switch to group window 3, changegroupactive, 3
bindd = SUPER CTRL ALT, code:83, Switch to group window 4, changegroupactive, 4
bindd = SUPER CTRL ALT, code:84, Switch to group window 5, changegroupactive, 5
bindd = SUPER CTRL ALT, code:85, Switch to group window 6, changegroupactive, 6
bindd = SUPER CTRL ALT, code:79, Switch to group window 7, changegroupactive, 7
bindd = SUPER CTRL ALT, code:80, Switch to group window 8, changegroupactive, 8
bindd = SUPER CTRL ALT, code:81, Switch to group window 9, changegroupactive, 9



# Screenshotting

bindd = , Page_Down, Screenshot of region, exec, omarchy-cmd-screenshot
bindd = SHIFT, Page_Down, Screenshot of window, exec, omarchy-cmd-screenshot smart clipboard
bindd = CTRL, Page_Down, Screenshot of display, exec, omarchy-cmd-screenshot output

# Screen Recording

bindd = ALT, Page_Down, Screenrecording, exec, omarchy-menu screenrecord

# Screen recordings
# bindd = ALT, Page_Down, Screen record a region, exec, omarchy-cmd-screenrecord region
# bindd = ALT SHIFT, Page_Down, Screen record a region with audio, exec, omarchy-cmd-screenrecord region audio
# bindd = CTRL ALT, Page_Down, Screen record display, exec, omarchy-cmd-screenrecord output
# bindd = CTRL ALT SHIFT, Page_Down, Screen record display with audio, exec, omarchy-cmd-screenrecord output audio
